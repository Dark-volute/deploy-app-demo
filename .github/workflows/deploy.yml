name: Build and Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true

env:
  QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
  QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
  QINIU_BUCKET: ${{ secrets.QINIU_BUCKET || 'fe-assets' }}
  QINIU_DOMAIN: ${{ secrets.QINIU_DOMAIN || 'https://up-z2.qiniup.com' }}
  DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
  GITHUB_SHA: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_VERSION: ${{ inputs.version }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建 + 上传资源 + 登记版本
        run: npm run build:deploy

      - name: SSH 部署 HTML 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/index.html"
          target: "/var/www/my-react-app/v${{ inputs.version }}"
          strip_components: 1

      - name: 部署成功
        if: success()
        run: echo "deploy success, version: ${{ inputs.version }}"
