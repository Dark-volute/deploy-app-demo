name: Build and Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: deploy
    env:
      QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
      QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
      QINIU_BUCKET: ${{ secrets.QINIU_BUCKET || 'fe-assets' }}
      QINIU_DOMAIN: ${{ secrets.QINIU_DOMAIN || 'https://up-z2.qiniup.com' }}
      DEPLOY_API_URL: ${{ secrets.DEPLOY_API_URL }}
      GITHUB_SHA: ${{ github.sha }}
      DEPLOY_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and upload
        run: npm run build:deploy

      # - name: Deploy HTML via SSH
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     source: "dist/index.html"
      #     target: "/var/www/my-react-app/v${{ env.DEPLOY_VERSION }}"
      #     strip_components: 1

      - name: Done
        if: success()
        run: echo "deploy success version=$DEPLOY_VERSION"
